<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NS CHAT - Real Firebase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #075E54;
            --primary-dark: #054c44;
            --primary-light: #128C7E;
            --accent: #25D366;
            --bg-dark: #111b21;
            --bg-sidebar: #202c33;
            --bg-chat: #0b141a;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --border-color: #2a3942;
            --message-sent: #005c4b;
            --message-received: #202c33;
            --danger: #f44336;
            --success: #4CAF50;
        }

        body {
            background: var(--bg-dark);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        #app {
            width: 100%;
            height: 100vh;
            background: var(--bg-chat);
            position: relative;
        }

        /* ========== LOGIN SCREEN ========== */
        #login-screen {
            width: 100%;
            height: 100vh;
            background: white;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .login-header {
            background: var(--primary);
            color: white;
            padding: 50px 20px;
            text-align: center;
        }

        .login-header i {
            font-size: 80px;
            margin-bottom: 20px;
            color: white;
        }

        .login-header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .login-header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .login-tabs {
            display: flex;
            background: white;
            border-bottom: 2px solid #e9edef;
        }

        .login-tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            font-weight: 600;
            color: #667781;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .login-tab.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        .login-form {
            display: none;
            padding: 25px 20px;
            flex: 1;
        }

        .login-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #3b4a54;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e9edef;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .phone-input {
            display: flex;
            gap: 10px;
        }

        .country-code {
            width: 80px;
            padding: 16px;
            background: #f0f2f4;
            border: 2px solid #e9edef;
            border-radius: 12px;
            font-weight: 600;
            color: var(--primary);
            text-align: center;
            font-size: 16px;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 0;
            transition: background 0.3s;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-primary:disabled {
            background: #80b5aa;
            cursor: not-allowed;
        }

        .btn-google {
            width: 100%;
            padding: 16px;
            background: white;
            color: #3b4a54;
            border: 2px solid #e9edef;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-google:hover {
            background: #f5f5f5;
        }

        .btn-google i {
            color: #DB4437;
            font-size: 20px;
        }

        .divider {
            text-align: center;
            position: relative;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e9edef;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #667781;
            font-size: 14px;
        }

        /* OTP Verification */
        .otp-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 30px 0;
        }

        .otp-input {
            width: 45px;
            height: 50px;
            border: 2px solid #e9edef;
            border-radius: 10px;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
        }

        .otp-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .timer {
            text-align: center;
            color: #667781;
            margin: 15px 0;
            font-size: 16px;
        }

        .resend-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            padding: 10px;
            font-size: 16px;
        }

        .resend-btn:disabled {
            color: #999;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            color: var(--primary);
            cursor: pointer;
            padding: 15px;
            font-size: 16px;
        }

        /* ========== MAIN APP ========== */
        #main-app {
            display: none;
            width: 100%;
            height: 100vh;
            background: var(--bg-chat);
            flex-direction: column;
        }

        /* Header */
        .app-header {
            background: var(--primary);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        .app-header h2 {
            font-size: 22px;
            font-weight: 500;
        }

        .header-icons {
            display: flex;
            gap: 20px;
        }

        .header-icons i {
            font-size: 22px;
            cursor: pointer;
        }

        /* Search Bar */
        .search-bar {
            padding: 12px;
            background: var(--bg-sidebar);
        }

        .search-box {
            background: #2a3942;
            border-radius: 10px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box i {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .search-box input {
            background: none;
            border: none;
            color: var(--text-primary);
            width: 100%;
            font-size: 16px;
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box input:focus {
            outline: none;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            overflow-y: auto;
            background: var(--bg-sidebar);
            padding-bottom: 60px;
        }

        /* Chat/User Items */
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            gap: 15px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #2a3942;
        }

        .chat-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 22px;
            position: relative;
            flex-shrink: 0;
        }

        .online-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: #4CAF50;
            border-radius: 50%;
            border: 2px solid var(--bg-sidebar);
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 16px;
        }

        .chat-last-msg {
            color: var(--text-secondary);
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            color: var(--text-secondary);
            font-size: 12px;
            margin-left: 10px;
        }

        /* Chat View */
        #chat-view {
            display: none;
            height: 100vh;
            background: var(--bg-chat);
            flex-direction: column;
        }

        .chat-header {
            background: var(--primary);
            color: white;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            height: 60px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-info h3 {
            font-size: 18px;
            margin-bottom: 3px;
            font-weight: 500;
        }

        .chat-header-info p {
            font-size: 13px;
            opacity: 0.8;
        }

        .chat-header-actions {
            display: flex;
            gap: 20px;
        }

        .chat-header-actions i {
            font-size: 22px;
            cursor: pointer;
        }

        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%230b141a" opacity="0.4"/></svg>');
        }

        .message {
            max-width: 80%;
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 12px;
            position: relative;
            clear: both;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            background: var(--message-sent);
            color: white;
            float: right;
            border-radius: 12px 12px 0 12px;
        }

        .message.received {
            background: var(--message-received);
            color: white;
            float: left;
            border-radius: 12px 12px 12px 0;
        }

        .message-time {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-left: 8px;
            display: inline-block;
        }

        .chat-input-area {
            background: var(--bg-sidebar);
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            background: #2a3942;
            border: none;
            border-radius: 25px;
            padding: 12px 15px;
            color: var(--text-primary);
            font-size: 16px;
        }

        .chat-input-area input:focus {
            outline: none;
        }

        .chat-input-area i {
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: var(--primary-dark);
        }

        .send-btn i {
            color: white;
            font-size: 18px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            background: var(--bg-sidebar);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60px;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            color: var(--text-secondary);
            padding: 5px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item i {
            font-size: 24px;
            display: block;
            margin-bottom: 3px;
        }

        .nav-item span {
            font-size: 11px;
        }

        /* Profile View */
        .profile-view {
            padding: 20px;
        }

        .profile-header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 48px;
            margin: 0 auto 15px;
        }

        .profile-name {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .profile-field {
            background: #2a3942;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .profile-field:hover {
            background: #3a4a54;
        }

        .profile-field label {
            display: block;
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .profile-field .value {
            color: var(--text-primary);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Settings View */
        .settings-section {
            margin-bottom: 20px;
        }

        .settings-title {
            padding: 15px 20px 5px;
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
        }

        .settings-item {
            background: #2a3942;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        .settings-item:hover {
            background: #3a4a54;
        }

        .settings-item i {
            width: 30px;
            color: var(--primary);
            font-size: 20px;
        }

        .settings-item span {
            color: var(--text-primary);
            flex: 1;
        }

        .settings-item .value {
            color: var(--text-secondary);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-sidebar);
            border-radius: 15px;
            padding: 20px;
            width: 90%;
            max-width: 350px;
        }

        .modal-content h3 {
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            background: #2a3942;
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            margin-bottom: 15px;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .modal-buttons .save {
            background: var(--primary);
            color: white;
        }

        .modal-buttons .save:hover {
            background: var(--primary-dark);
        }

        .modal-buttons .cancel {
            background: #2a3942;
            color: var(--text-primary);
        }

        .modal-buttons .cancel:hover {
            background: #3a4a54;
        }

        .error-message, .success-message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }

        .error-message {
            background: rgba(244,67,54,0.1);
            color: var(--danger);
        }

        .success-message {
            background: rgba(76,175,80,0.1);
            color: var(--success);
        }

        .typing-indicator {
            padding: 8px 12px;
            background: var(--message-received);
            border-radius: 18px;
            width: fit-content;
            margin-bottom: 10px;
            clear: both;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #8696a0;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }

        .no-data {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 20px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen">
            <div class="login-header">
                <i class="fab fa-whatsapp"></i>
                <h1>NS CHAT</h1>
                <p>Connect with your world instantly</p>
            </div>

            <div class="login-tabs">
                <div class="login-tab active" onclick="switchLoginTab('phone')">Phone</div>
                <div class="login-tab" onclick="switchLoginTab('email')">Email</div>
            </div>

            <!-- Phone Login -->
            <div id="phone-login" class="login-form active">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="name" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Phone Number (India)</label>
                    <div class="phone-input">
                        <input type="text" class="country-code" value="+91" readonly>
                        <input type="tel" id="phone" placeholder="9876543210" maxlength="10">
                    </div>
                </div>
                <div id="recaptcha-container"></div>
                <button class="btn-primary" onclick="sendOTP()" id="send-otp-btn">Send OTP</button>

                <div class="divider">
                    <span>or</span>
                </div>

                <button class="btn-google" onclick="googleLogin()">
                    <i class="fab fa-google"></i>
                    Continue with Google
                </button>
            </div>

            <!-- OTP Verification -->
            <div id="otp-verification" class="login-form">
                <p style="text-align: center; margin-bottom: 20px; font-size: 16px;">
                    Enter the 6-digit code sent to<br>
                    <strong id="display-phone"></strong>
                </p>
                
                <div class="otp-container">
                    <input type="text" class="otp-input" maxlength="1" id="otp1" onkeyup="moveToNext(this, 1)" onkeypress="handleOtpKeyPress(event)">
                    <input type="text" class="otp-input" maxlength="1" id="otp2" onkeyup="moveToNext(this, 2)" onkeypress="handleOtpKeyPress(event)">
                    <input type="text" class="otp-input" maxlength="1" id="otp3" onkeyup="moveToNext(this, 3)" onkeypress="handleOtpKeyPress(event)">
                    <input type="text" class="otp-input" maxlength="1" id="otp4" onkeyup="moveToNext(this, 4)" onkeypress="handleOtpKeyPress(event)">
                    <input type="text" class="otp-input" maxlength="1" id="otp5" onkeyup="moveToNext(this, 5)" onkeypress="handleOtpKeyPress(event)">
                    <input type="text" class="otp-input" maxlength="1" id="otp6" onkeyup="moveToNext(this, 6)" onkeypress="handleOtpKeyPress(event)">
                </div>

                <div class="timer" id="timer">00:30</div>
                
                <button class="btn-primary" onclick="verifyOTP()" id="verify-otp-btn">Verify OTP</button>
                
                <div style="text-align: center;">
                    <button class="resend-btn" onclick="resendOTP()" id="resendOtpBtn" disabled>Resend OTP</button>
                </div>

                <div class="back-link" onclick="backToPhone()">← Back to login</div>
            </div>

            <!-- Email Login -->
            <div id="email-login" class="login-form">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="email-name" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Min 6 characters">
                </div>
                <button class="btn-primary" onclick="emailSignup()">Sign Up / Login</button>

                <div class="divider">
                    <span>or</span>
                </div>

                <button class="btn-google" onclick="googleLogin()">
                    <i class="fab fa-google"></i>
                    Continue with Google
                </button>
            </div>

            <div id="login-message" style="padding: 0 20px;"></div>
        </div>

        <!-- Main App -->
        <div id="main-app">
            <!-- Header -->
            <div class="app-header" id="main-header">
                <h2 id="header-title">NS CHAT</h2>
                <div class="header-icons">
                    <i class="fas fa-camera"></i>
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="search-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search...">
                </div>
            </div>

            <!-- Content Area -->
            <div class="content-area" id="content-area">
                <!-- Chats View -->
                <div id="chats-view">
                    <div id="chats-list"></div>
                </div>

                <!-- Users View -->
                <div id="users-view" style="display: none;">
                    <div id="users-list"></div>
                </div>

                <!-- Profile View -->
                <div id="profile-view" style="display: none;">
                    <div class="profile-view">
                        <div class="profile-header-section">
                            <div class="profile-avatar" id="profile-avatar">NS</div>
                            <h2 class="profile-name" id="profile-name"></h2>
                        </div>

                        <div class="profile-field" onclick="editStatus()">
                            <label>Status</label>
                            <div class="value">
                                <span id="profile-status">Hey there! I am using NS CHAT</span>
                                <i class="fas fa-pen"></i>
                            </div>
                        </div>

                        <div class="profile-field">
                            <label>Phone</label>
                            <div class="value" id="profile-phone"></div>
                        </div>

                    <div class="settings-section">

                    <i class="fas fa-users"></i>

                <div class="nav-item" onclick="switchView('profile')">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>

        <!-- Chat View -->
        <div id="chat-view">
            <div class="chat-header">
                <i class="fas fa-arrow-left back-btn" onclick="closeChat()"></i>
                <div class="chat-header-info">

                    <p id="chat-user-status">...</p>
                </div>
                <div class="chat-header-actions">
                    <i class="fas fa-phone"></i>
                    <i class="fas fa-video"></i>

            </div>

            <div id="chat-messages"></div>

            <div class="chat-input-area">
                <i class="fas fa-smile"></i>
                <i class="fas fa-paperclip"></i>
                <input type="text" id="message-input" placeholder="Type a message" onkeypress="handleTyping(event)">

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Edit</h3>
            <input type="text" id="modal-input" placeholder="Enter new value">
            <div class="modal-buttons">
                <button class="save" onclick="saveEdit()">Save</button>
                <button class="cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // ==================== YOUR FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyD6PdODoYg_jhRfd9ZEZ72ftlvjZwAyxSg",
            authDomain: "ns-chat-b0965.firebaseapp.com",
            projectId: "ns-chat-b0965",
            storageBucket: "ns-chat-b0965.firebasestorage.app",
            messagingSenderId: "777022101127",
            appId: "1:777022101127:web:a861ac69d3cbfeb3028a22",
            measurementId: "G-LEF0GC4XRW"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Enable offline persistence
        db.enablePersistence().catch(err => console.log('Persistence error:', err));

        // Set language for OTP
        auth.useDeviceLanguage();

        // ==================== GLOBAL VARIABLES ====================
        let currentUser = null;
        let currentUserData = null;
        let currentChatUser = null;
        let currentChatId = null;
        let messagesUnsubscribe = null;
        let typingTimeout = null;
        let otpTimer = 30;
        let timerInterval = null;
        let confirmationResult = null;
        let currentEditField = '';

        // ==================== AUTH STATE ====================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                console.log('User logged in:', user.uid);
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                document.getElementById('chat-view').style.display = 'none';
                
                await saveUserToFirestore(user);
                await loadUserData();
                loadChats();
                loadUsers();
                updateOnlineStatus(true);
                
                showChatsView();
            } else {
                console.log('User logged out');
                currentUser = null;
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
                document.getElementById('chat-view').style.display = 'none';
                
                if (messagesUnsubscribe) messagesUnsubscribe();
                clearLoginFields();
            }
        });

        function clearLoginFields() {
            document.getElementById('name').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('email-name').value = '';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            
            // Clear OTP inputs
            for (let i = 1; i <= 6; i++) {
                const otp = document.getElementById(`otp${i}`);
                if (otp) otp.value = '';
            }
        }

        // ==================== SAVE USER TO FIRESTORE ====================
        async function saveUserToFirestore(user) {
            const userRef = db.collection('users').doc(user.uid);
            const doc = await userRef.get();
            
            if (!doc.exists) {
                // Get name from input or display name
                const name = document.getElementById('name')?.value || 
                            document.getElementById('email-name')?.value || 
                            user.displayName || 
                            user.email?.split('@')[0] || 
                            'User';
                
                const userData = {
                    uid: user.uid,
                    name: name,
                    email: user.email || '',
                    phone: user.phoneNumber || '',
                    avatar: name.charAt(0).toUpperCase(),
                    status: 'Hey there! I am using NS CHAT',
                    online: true,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                await userRef.set(userData);
                console.log('New user created:', name);
            } else {
                await userRef.update({
                    online: true,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        }

        // ==================== LOAD USER DATA ====================
        async function loadUserData() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists) {
                currentUserData = doc.data();
                const data = currentUserData;
                
                document.getElementById('profile-name').textContent = data.name;
                document.getElementById('profile-avatar').textContent = data.avatar || data.name.charAt(0).toUpperCase();
                document.getElementById('profile-status').textContent = data.status || 'Hey there!';
                document.getElementById('profile-phone').textContent = data.phone || 'Not provided';
                document.getElementById('profile-email').textContent = data.email || 'Not provided';
                document.getElementById('settings-name').textContent = data.name;
                document.getElementById('settings-status').textContent = data.status || 'Hey there!';
            }
        }

        // ==================== UPDATE ONLINE STATUS ====================
        function updateOnlineStatus(status) {
            if (!currentUser) return;
            db.collection('users').doc(currentUser.uid).update({
                online: status,
                lastSeen: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(err => console.log('Status update error:', err));
        }

        window.addEventListener('beforeunload', () => {
            if (currentUser) {
                db.collection('users').doc(currentUser.uid).update({
                    online: false,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        });

        // ==================== LOAD USERS ====================
        function loadUsers() {
            if (!currentUser) return;
            
            db.collection('users')
                .where('uid', '!=', currentUser.uid)
                .onSnapshot((snapshot) => {
                    const usersList = document.getElementById('users-list');
                    usersList.innerHTML = '';
                    
                    if (snapshot.empty) {
                        usersList.innerHTML = '<div class="no-data">No other users found</div>';
                        return;
                    }
                    
                    snapshot.forEach((doc) => {
                        const user = doc.data();
                        usersList.appendChild(createUserItem(user));
                    });
                }, (error) => {
                    console.log('Load users error:', error);
                });
        }

        function createUserItem(user) {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.setAttribute('data-userid', user.uid);
            div.innerHTML = `
                <div class="chat-avatar">
                    ${user.avatar || user.name.charAt(0).toUpperCase()}
                    ${user.online ? '<span class="online-badge"></span>' : ''}
                </div>
                <div class="chat-info">
                    <div class="chat-name">${user.name}</div>
                    <div class="chat-last-msg">${user.status || 'Hey there!'}</div>
                </div>
            `;
            div.onclick = () => startChat(user);
            return div;
        }

        // ==================== LOAD CHATS ====================
        function loadChats() {
            if (!currentUser) return;
            
            db.collection('chats')
                .where('participants', 'array-contains', currentUser.uid)
                .orderBy('lastMessageTime', 'desc')
                .onSnapshot(async (snapshot) => {
                    const chatsList = document.getElementById('chats-list');
                    chatsList.innerHTML = '';
                    
                    if (snapshot.empty) {
                        chatsList.innerHTML = '<div class="no-data">No chats yet. Go to Users tab to start chatting.</div>';
                        return;
                    }
                    
                    for (const doc of snapshot.docs) {
                        const chat = doc.data();
                        const otherUserId = chat.participants.find(id => id !== currentUser.uid);
                        const otherUser = await getUserData(otherUserId);
                        
                        if (otherUser) {
                            chatsList.appendChild(createChatItem(chat, otherUser, doc.id));
                        }
                    }
                }, (error) => {
                    console.log('Load chats error:', error);
                });
        }

        async function getUserData(userId) {
            try {
                const doc = await db.collection('users').doc(userId).get();
                return doc.exists ? doc.data() : null;
            } catch (error) {
                console.log('Get user data error:', error);
                return null;
            }
        }

        function createChatItem(chat, user, chatId) {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.setAttribute('data-chatid', chatId);
            div.innerHTML = `
                <div class="chat-avatar">
                    ${user.avatar || user.name.charAt(0).toUpperCase()}
                    ${user.online ? '<span class="online-badge"></span>' : ''}
                </div>
                <div class="chat-info">
                    <div class="chat-name">${user.name}</div>
                    <div class="chat-last-msg">
                        ${chat.lastMessage || 'No messages yet'}
                    </div>
                </div>
                <div class="chat-time">
                    ${chat.lastMessageTime ? formatTime(chat.lastMessageTime.toDate()) : ''}
                </div>
            `;
            div.onclick = () => openChat(user, chatId);
            return div;
        }

        // ==================== CHAT FUNCTIONS ====================
        async function startChat(user) {
            if (!currentUser) return;
            
            try {
                const chatsRef = db.collection('chats');
                const snapshot = await chatsRef
                    .where('participants', 'array-contains', currentUser.uid)
                    .get();
                
                let existingChatId = null;
                
                snapshot.forEach((doc) => {
                    const chat = doc.data();
                    if (chat.participants.includes(user.uid)) {
                        existingChatId = doc.id;
                    }
                });
                
                if (existingChatId) {
                    openChat(user, existingChatId);
                } else {
                    const newChat = {
                        participants: [currentUser.uid, user.uid],
                        lastMessage: '',
                        lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                        lastMessageStatus: 'sent',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    
                    const doc = await chatsRef.add(newChat);
                    openChat(user, doc.id);
                }
            } catch (error) {
                console.log('Start chat error:', error);
                showMessage('Failed to start chat: ' + error.message, 'error');
            }
        }

        function openChat(user, chatId) {
            currentChatUser = user;
            currentChatId = chatId;
            
            document.getElementById('chat-user-name').textContent = user.name;
            document.getElementById('chat-user-status').textContent = user.online ? 'Online' : 'Offline';
            
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('chat-view').style.display = 'flex';
            
            loadMessages(chatId);
        }

        function closeChat() {
            document.getElementById('chat-view').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            
            if (messagesUnsubscribe) {
                messagesUnsubscribe();
            }
        }

        function showChatsView() {
            document.getElementById('chats-view').style.display = 'block';
            document.getElementById('users-view').style.display = 'none';
            document.getElementById('profile-view').style.display = 'none';
            document.getElementById('settings-view').style.display = 'none';
            document.getElementById('header-title').textContent = 'NS CHAT';
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelectorAll('.nav-item')[0].classList.add('active');
        }

        // ==================== LOAD MESSAGES ====================
        function loadMessages(chatId) {
            if (messagesUnsubscribe) {
                messagesUnsubscribe();
            }
            
            messagesUnsubscribe = db.collection('messages')
                .where('chatId', '==', chatId)
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    const messagesContainer = document.getElementById('chat-messages');
                    messagesContainer.innerHTML = '';
                    
                    if (snapshot.empty) {
                        messagesContainer.innerHTML = '<div style="text-align: center; color: #8696a0; padding: 20px;">No messages yet. Say hi!</div>';
                        return;
                    }
                    
                    snapshot.forEach((doc) => {
                        const message = doc.data();
                        displayMessage(message);
                    });
                    
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    markMessagesAsRead(chatId);
                }, (error) => {
                    console.log('Load messages error:', error);
                });
        }

        function displayMessage(message) {
            const div = document.createElement('div');
            div.className = `message ${message.senderId === currentUser.uid ? 'sent' : 'received'}`;
            
            const time = message.timestamp ? message.timestamp.toDate() : new Date();
            const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            div.innerHTML = `
                <div>${escapeHtml(message.text)}</div>
                <div class="message-time">${timeStr}</div>
            `;
            
            document.getElementById('chat-messages').appendChild(div);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function markMessagesAsRead(chatId) {
            if (!currentUser || !currentChatUser) return;
            
            db.collection('messages')
                .where('chatId', '==', chatId)
                .where('receiverId', '==', currentUser.uid)
                .where('status', '==', 'sent')
                .get()
                .then((snapshot) => {
                    snapshot.forEach((doc) => {
                        doc.ref.update({ status: 'delivered' });
                    });
                }).catch(err => console.log('Mark read error:', err));
        }

        // ==================== SEND MESSAGE ====================
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text || !currentChatUser || !currentChatId) return;
            
            try {
                const message = {
                    chatId: currentChatId,
                    senderId: currentUser.uid,
                    receiverId: currentChatUser.uid,
                    text: text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'sent'
                };
                
                await db.collection('messages').add(message);
                
                await db.collection('chats').doc(currentChatId).update({
                    lastMessage: text,
                    lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                    lastMessageStatus: 'sent'
                });
                
                input.value = '';
                
            } catch (error) {
                console.log('Send message error:', error);
                alert('Failed to send message');
            }
        }

        function handleTyping(event) {
            if (event.key === 'Enter') {
                sendMessage();
                return;
            }
            
            if (!currentChatUser || !currentChatId) return;
            
            const typingRef = db.collection('typing').doc(`${currentUser.uid}_${currentChatUser.uid}`);
            
            typingRef.set({
                isTyping: true,
                userId: currentUser.uid,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(err => console.log('Typing error:', err));
            
            if (typingTimeout) clearTimeout(typingTimeout);
            
            typingTimeout = setTimeout(() => {
                typingRef.delete().catch(err => console.log('Typing delete error:', err));
            }, 2000);
        }

        // ==================== PHONE AUTH (REAL) ====================
        let recaptchaVerifier = null;

        function sendOTP() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            
            if (!name) {
                showMessage('Please enter your name', 'error');
                return;
            }
            
            if (!phone || phone.length !== 10) {
                showMessage('Please enter a valid 10-digit phone number', 'error');
                return;
            }
            
            if (!/^\d{10}$/.test(phone)) {
                showMessage('Phone number must contain only digits', 'error');
                return;
            }
            
            const phoneNumber = '+91' + phone;
            document.getElementById('display-phone').textContent = phoneNumber;
            
            // Store name for later use
            sessionStorage.setItem('pendingName', name);
            
            // Disable button to prevent multiple clicks
            const sendBtn = document.getElementById('send-otp-btn');
            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';
            
            // Create reCAPTCHA verifier
            if (!recaptchaVerifier) {
                recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                    'size': 'invisible',
                    'callback': (response) => {
                        console.log('reCAPTCHA solved');
                    }
                });
            }
            
            // Send OTP
            auth.signInWithPhoneNumber(phoneNumber, recaptchaVerifier)
                .then((result) => {
                    confirmationResult = result;
                    
                    // Switch to OTP screen
                    document.getElementById('phone-login').classList.remove('active');
                    document.getElementById('otp-verification').classList.add('active');
                    
                    // Start timer
                    startOTPTimer();
                    
                    sendBtn.disabled = false;
                    sendBtn.textContent = 'Send OTP';
                    
                    showMessage('OTP sent successfully!', 'success');
                })
                .catch((error) => {
                    console.log('OTP error:', error);
                    sendBtn.disabled = false;
                    sendBtn.textContent = 'Send OTP';
                    showMessage('Failed to send OTP: ' + error.message, 'error');
                });
        }

        function verifyOTP() {
            const otp = getOTP();
            
            if (otp.length !== 6) {
                showMessage('Please enter 6-digit OTP', 'error');
                return;
            }
            
            if (!confirmationResult) {
                showMessage('Please request OTP first', 'error');
                return;
            }
            
            const verifyBtn = document.getElementById('verify-otp-btn');
            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Verifying...';
            
            confirmationResult.confirm(otp)
                .then((result) => {
                    // Get name from session storage
                    const name = sessionStorage.getItem('pendingName') || 'User';
                    
                    // Update user profile with name
                    if (result.user) {
                        result.user.updateProfile({
                            displayName: name
                        }).catch(err => console.log('Profile update error:', err));
                    }
                    
                    sessionStorage.removeItem('pendingName');
                    
                    clearInterval(timerInterval);
                    showMessage('Login successful!', 'success');
                })
                .catch((error) => {
                    console.log('Verification error:', error);
                    verifyBtn.disabled = false;
                    verifyBtn.textContent = 'Verify OTP';
                    showMessage('Invalid OTP: ' + error.message, 'error');
                });
        }

        function getOTP() {
            let otp = '';
            for (let i = 1; i <= 6; i++) {
                otp += document.getElementById(`otp${i}`).value;
            }
            return otp;
        }

        function resendOTP() {
            if (!confirmationResult) {
                showMessage('Please request OTP again', 'error');
                return;
            }
            
            // Re-send OTP using the same phone number
            const phoneNumber = document.getElementById('display-phone').textContent;
            
            auth.signInWithPhoneNumber(phoneNumber, recaptchaVerifier)
                .then((result) => {
                    confirmationResult = result;
                    otpTimer = 30;
                    startOTPTimer();
                    showMessage('OTP resent!', 'success');
                })
                .catch((error) => {
                    console.log('Resend error:', error);
                    showMessage('Failed to resend OTP: ' + error.message, 'error');
                });
        }

        function startOTPTimer() {
            const timerEl = document.getElementById('timer');
            const resendBtn = document.getElementById('resendOtpBtn');
            
            if (timerInterval) clearInterval(timerInterval);
            
            resendBtn.disabled = true;
            otpTimer = 30;
            
            timerInterval = setInterval(() => {
                otpTimer--;
                const minutes = Math.floor(otpTimer / 60);
                const seconds = otpTimer % 60;
                timerEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (otpTimer <= 0) {
                    clearInterval(timerInterval);
                    resendBtn.disabled = false;
                    timerEl.textContent = '00:30';
                }
            }, 1000);
        }

        function backToPhone() {
            document.getElementById('otp-verification').classList.remove('active');
            document.getElementById('phone-login').classList.add('active');
            clearInterval(timerInterval);
        }

        function moveToNext(input, nextId) {
            if (input.value.length === 1 && nextId < 6) {
                document.getElementById(`otp${nextId + 1}`).focus();
            }
        }

        function handleOtpKeyPress(event) {
            // Allow only numbers
            const charCode = event.which ? event.which : event.keyCode;
            if (charCode < 48 || charCode > 57) {
                event.preventDefault();
            }
        }

        // ==================== GOOGLE AUTH (REAL) ====================
        async function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            
            try {
                await auth.signInWithPopup(provider);
                showMessage('Google login successful!', 'success');
            } catch (error) {
                console.log('Google login error:', error);
                showMessage('Google login failed: ' + error.message, 'error');
            }
        }

        // ==================== EMAIL AUTH (REAL) ====================
        async function emailSignup() {
            const name = document.getElementById('email-name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!name) {
                showMessage('Please enter your name', 'error');
                return;
            }
            
            if (!email) {
                showMessage('Please enter your email', 'error');
                return;
            }
            
            if (!password || password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            try {
                // Try to sign in
                let userCredential;
                try {
                    userCredential = await auth.signInWithEmailAndPassword(email, password);
                    showMessage('Login successful!', 'success');
                } catch (error) {
                    if (error.code === 'auth/user-not-found') {
                        // Create new user
                        userCredential = await auth.createUserWithEmailAndPassword(email, password);
                        
                        // Update profile with name
                        await userCredential.user.updateProfile({
                            displayName: name
                        });
                        
                        showMessage('Account created successfully!', 'success');
                    } else {
                        throw error;
                    }
                }
            } catch (error) {
                console.log('Email auth error:', error);
                showMessage('Authentication failed: ' + error.message, 'error');
            }
        }

        // ==================== PROFILE FUNCTIONS ====================
        function editStatus() {
            currentEditField = 'status';
            document.getElementById('modal-title').textContent = 'Edit Status';
            document.getElementById('modal-input').value = currentUserData?.status || '';
            document.getElementById('edit-modal').classList.add('active');
        }

        function editName() {
            currentEditField = 'name';
            document.getElementById('modal-title').textContent = 'Edit Name';
            document.getElementById('modal-input').value = currentUserData?.name || '';
            document.getElementById('edit-modal').classList.add('active');
        }

        async function saveEdit() {
            const newValue = document.getElementById('modal-input').value.trim();
            
            if (!newValue) {
                alert('Please enter a value');
                return;
            }
            
            try {
                const updateData = {};
                
                if (currentEditField === 'status') {
                    updateData.status = newValue;
                } else if (currentEditField === 'name') {
                    updateData.name = newValue;
                    updateData.avatar = newValue.charAt(0).toUpperCase();
                }
                
                await db.collection('users').doc(currentUser.uid).update(updateData);
                await loadUserData();
                closeModal();
                showMessage('Updated successfully!', 'success');
                
            } catch (error) {
                console.log('Update error:', error);
                alert('Failed to update: ' + error.message);
            }
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.remove('active');
            document.getElementById('modal-input').value = '';
        }

        // ==================== LOGOUT ====================
        async function logout() {
            try {
                await updateOnlineStatus(false);
                await auth.signOut();
            } catch (error) {
                console.log('Logout error:', error);
                alert('Logout failed: ' + error.message);
            }
        }

        // ==================== VIEW FUNCTIONS ====================
        function switchView(view) {
            document.getElementById('chats-view').style.display = 'none';
            document.getElementById('users-view').style.display = 'none';
            document.getElementById('profile-view').style.display = 'none';
            document.getElementById('settings-view').style.display = 'none';
            
            document.getElementById(view + '-view').style.display = 'block';
            
            if (view === 'chats') {
                document.getElementById('header-title').textContent = 'NS CHAT';
            } else if (view === 'users') {
                document.getElementById('header-title').textContent = 'Users';
            } else if (view === 'profile') {
                document.getElementById('header-title').textContent = 'Profile';
            } else if (view === 'settings') {
                document.getElementById('header-title').textContent = 'Settings';
            }
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (view === 'chats') document.querySelectorAll('.nav-item')[0].classList.add('active');
            if (view === 'users') document.querySelectorAll('.nav-item')[1].classList.add('active');
            if (view === 'profile') document.querySelectorAll('.nav-item')[2].classList.add('active');
            if (view === 'settings') document.querySelectorAll('.nav-item')[3].classList.add('active');
        }

        function switchLoginTab(tab) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'phone') {
                document.querySelectorAll('.login-tab')[0].classList.add('active');
                document.getElementById('phone-login').classList.add('active');
            } else {
                document.querySelectorAll('.login-tab')[1].classList.add('active');
                document.getElementById('email-login').classList.add('active');
            }
        }

        function formatTime(date) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            
            if (date >= today) {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else {
                return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
            }
        }

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('login-message');
            messageDiv.textContent = msg;
            messageDiv.className = type === 'error' ? 'error-message' : 'success-message';
            
            setTimeout(() => {
                messageDiv.textContent = '';
            }, 5000);
        }

        // Search functionality
        document.getElementById('search-input')?.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            
            document.querySelectorAll('.chat-item').forEach(item => {
                const name = item.querySelector('.chat-name')?.textContent.toLowerCase() || '';
                item.style.display = name.includes(term) ? 'flex' : 'none';
            });
        });

        // Close modal on outside click
        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('edit-modal')) {
                closeModal();
            }
        });

        // Initialize
        console.log('NS CHAT - Real Firebase Authentication Ready');
    </script>
</body>
</html>

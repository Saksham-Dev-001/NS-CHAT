<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NS CHAT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #075E54;
            --primary-dark: #054c44;
            --primary-light: #128C7E;
            --accent: #25D366;
            --bg-dark: #111b21;
            --bg-sidebar: #202c33;
            --bg-chat: #0b141a;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --border-color: #2a3942;
            --message-sent: #005c4b;
            --message-received: #202c33;
            --danger: #f44336;
            --success: #4CAF50;
            --warning: #ff9800;
        }

        body {
            background: var(--bg-dark);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        #app {
            width: 100%;
            height: 100vh;
            background: var(--bg-chat);
            position: relative;
        }

        /* ========== LOGIN SCREEN ========== */
        #login-screen {
            width: 100%;
            height: 100vh;
            background: white;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .login-header {
            background: var(--primary);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .login-header i {
            font-size: 70px;
            margin-bottom: 20px;
        }

        .login-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .login-header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .login-tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #e9edef;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .login-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-weight: 600;
            color: #667781;
            cursor: pointer;
        }

        .login-tab.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        .login-form {
            display: none;
            padding: 20px;
        }

        .login-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #3b4a54;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e9edef;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .phone-input {
            display: flex;
            gap: 10px;
        }

        .country-code {
            width: 80px;
            padding: 15px;
            background: #f0f2f4;
            border: 2px solid #e9edef;
            border-radius: 12px;
            font-weight: 600;
            color: var(--primary);
            text-align: center;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 0;
        }

        .btn-primary:active {
            background: var(--primary-dark);
        }

        .btn-google {
            width: 100%;
            padding: 15px;
            background: white;
            color: #3b4a54;
            border: 2px solid #e9edef;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:active {
            background: #f5f5f5;
        }

        .btn-google i {
            color: #DB4437;
        }

        .divider {
            text-align: center;
            position: relative;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e9edef;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #667781;
            font-size: 14px;
        }

        /* OTP Verification */
        .otp-container {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 30px 0;
        }

        .otp-input {
            width: 45px;
            height: 45px;
            border: 2px solid #e9edef;
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
        }

        .otp-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .timer {
            text-align: center;
            color: #667781;
            margin: 15px 0;
        }

        .resend-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            padding: 10px;
        }

        .back-link {
            text-align: center;
            color: var(--primary);
            cursor: pointer;
            padding: 15px;
        }

        /* ========== MAIN APP ========== */
        #main-app {
            display: none;
            width: 100%;
            height: 100vh;
            background: var(--bg-chat);
        }

        /* Chats List View */
        #chats-view {
            display: none;
            height: 100%;
            background: var(--bg-sidebar);
        }

        .app-header {
            background: var(--primary);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .app-header h2 {
            font-size: 22px;
        }

        .header-icons {
            display: flex;
            gap: 20px;
        }

        .header-icons i {
            font-size: 22px;
        }

        .search-bar {
            padding: 12px;
            background: var(--bg-sidebar);
        }

        .search-box {
            background: #2a3942;
            border-radius: 10px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box i {
            color: var(--text-secondary);
        }

        .search-box input {
            background: none;
            border: none;
            color: var(--text-primary);
            width: 100%;
            font-size: 16px;
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            gap: 15px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        .chat-item:active {
            background: #2a3942;
        }

        .chat-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 22px;
            position: relative;
        }

        .online-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: #4CAF50;
            border-radius: 50%;
            border: 2px solid var(--bg-sidebar);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 5px;
        }

        .chat-last-msg {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .chat-time {
            color: var(--text-secondary);
            font-size: 12px;
        }

        /* Chat View */
        #chat-view {
            display: none;
            height: 100%;
            background: var(--bg-chat);
            flex-direction: column;
        }

        .chat-header {
            background: var(--primary);
            color: white;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-info h3 {
            font-size: 18px;
            margin-bottom: 3px;
        }

        .chat-header-info p {
            font-size: 13px;
            opacity: 0.8;
        }

        .chat-header-actions {
            display: flex;
            gap: 20px;
        }

        .chat-header-actions i {
            font-size: 22px;
        }

        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%230b141a" opacity="0.4"/></svg>');
        }

        .message {
            max-width: 80%;
            margin-bottom: 10px;
            padding: 10px 15px;
            border-radius: 12px;
            position: relative;
            clear: both;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.sent {
            background: var(--message-sent);
            color: white;
            float: right;
            border-radius: 12px 12px 0 12px;
        }

        .message.received {
            background: var(--message-received);
            color: white;
            float: left;
            border-radius: 12px 12px 12px 0;
        }

        .message-time {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-left: 8px;
            display: inline-block;
        }

        .chat-input-area {
            background: var(--bg-sidebar);
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            background: #2a3942;
            border: none;
            border-radius: 25px;
            padding: 12px 15px;
            color: var(--text-primary);
            font-size: 16px;
        }

        .chat-input-area input:focus {
            outline: none;
        }

        .chat-input-area i {
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .send-btn:active {
            background: var(--primary-dark);
        }

        .send-btn i {
            color: white;
            font-size: 18px;
        }

        /* Users List View */
        #users-view {
            display: none;
            height: 100%;
            background: var(--bg-sidebar);
        }

        /* Profile View */
        #profile-view {
            display: none;
            height: 100%;
            background: var(--bg-sidebar);
            overflow-y: auto;
        }

        .profile-header {
            background: var(--primary);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-content {
            padding: 20px;
        }

        .profile-avatar-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 48px;
            margin: 0 auto 15px;
        }

        .profile-field {
            background: #2a3942;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .profile-field label {
            display: block;
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .profile-field .value {
            color: var(--text-primary);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .profile-field i {
            color: var(--text-secondary);
            cursor: pointer;
            padding: 5px;
        }

        /* Settings View */
        #settings-view {
            display: none;
            height: 100%;
            background: var(--bg-sidebar);
            overflow-y: auto;
        }

        .settings-section {
            margin-bottom: 20px;
        }

        .settings-title {
            padding: 15px;
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
        }

        .settings-item {
            background: #2a3942;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        .settings-item:active {
            background: #3a4a54;
        }

        .settings-item i {
            width: 30px;
            color: var(--primary);
            font-size: 20px;
        }

        .settings-item span {
            color: var(--text-primary);
            flex: 1;
        }

        .settings-item .value {
            color: var(--text-secondary);
        }

        /* Bottom Navigation */
        .bottom-nav {
            background: var(--bg-sidebar);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            color: var(--text-secondary);
            padding: 5px;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item i {
            font-size: 24px;
            display: block;
            margin-bottom: 3px;
        }

        .nav-item span {
            font-size: 11px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-sidebar);
            border-radius: 15px;
            padding: 20px;
            width: 90%;
            max-width: 350px;
        }

        .modal-content h3 {
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            background: #2a3942;
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            margin-bottom: 15px;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .modal-buttons .save {
            background: var(--primary);
            color: white;
        }

        .modal-buttons .cancel {
            background: #2a3942;
            color: var(--text-primary);
        }

        .error-message, .success-message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            text-align: center;
        }

        .error-message {
            background: rgba(244,67,54,0.1);
            color: var(--danger);
        }

        .success-message {
            background: rgba(76,175,80,0.1);
            color: var(--success);
        }

        .typing-indicator {
            padding: 8px 12px;
            background: var(--message-received);
            border-radius: 18px;
            width: fit-content;
            margin-bottom: 10px;
            clear: both;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #8696a0;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen">
            <div class="login-header">
                <i class="fab fa-whatsapp"></i>
                <h1>NS CHAT</h1>
                <p>Connect with your world</p>
            </div>

            <div class="login-tabs">
                <div class="login-tab active" onclick="switchLoginTab('phone')">Phone</div>
                <div class="login-tab" onclick="switchLoginTab('email')">Email</div>
            </div>

            <!-- Phone Login -->
            <div id="phone-login" class="login-form active">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="name" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <div class="phone-input">
                        <input type="text" class="country-code" value="+91" readonly>
                        <input type="tel" id="phone" placeholder="9876543210" maxlength="10">
                    </div>
                </div>
                <button class="btn-primary" onclick="sendOTP()">Send OTP</button>

                <div class="divider">
                    <span>or</span>
                </div>

                <button class="btn-google" onclick="googleLogin()">
                    <i class="fab fa-google"></i>
                    Continue with Google
                </button>
            </div>

            <!-- OTP Verification -->
            <div id="otp-verification" class="login-form">
                <p style="text-align: center; margin-bottom: 20px;">
                    Enter the 6-digit code sent to<br>
                    <strong id="display-phone"></strong>
                </p>
                
                <div class="otp-container">
                    <input type="text" class="otp-input" maxlength="1" id="otp1" onkeyup="moveToNext(this, 1)">
                    <input type="text" class="otp-input" maxlength="1" id="otp2" onkeyup="moveToNext(this, 2)">
                    <input type="text" class="otp-input" maxlength="1" id="otp3" onkeyup="moveToNext(this, 3)">
                    <input type="text" class="otp-input" maxlength="1" id="otp4" onkeyup="moveToNext(this, 4)">
                    <input type="text" class="otp-input" maxlength="1" id="otp5" onkeyup="moveToNext(this, 5)">
                    <input type="text" class="otp-input" maxlength="1" id="otp6" onkeyup="moveToNext(this, 6)">
                </div>

                <div class="timer" id="timer">00:30</div>
                
                <button class="btn-primary" onclick="verifyOTP()">Verify OTP</button>
                
                <div style="text-align: center;">
                    <button class="resend-btn" onclick="resendOTP()" id="resendOtpBtn" disabled>Resend OTP</button>
                </div>

                <div class="back-link" onclick="backToPhone()">← Back</div>
            </div>

            <!-- Email Login -->
            <div id="email-login" class="login-form">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="email-name" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Min 6 characters">
                </div>
                <button class="btn-primary" onclick="emailSignup()">Sign Up / Login</button>

                <div class="divider">
                    <span>or</span>
                </div>

                <button class="btn-google" onclick="googleLogin()">
                    <i class="fab fa-google"></i>
                    Google
                </button>
            </div>

            <div id="login-message"></div>
        </div>

        <!-- Main App -->
        <div id="main-app">
            <!-- Chats View -->
            <div id="chats-view">
                <div class="app-header">
                    <h2>NS CHAT</h2>
                    <div class="header-icons">
                        <i class="fas fa-camera"></i>
                        <i class="fas fa-ellipsis-v"></i>
                    </div>
                </div>

                <div class="search-bar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-chats" placeholder="Search...">
                    </div>
                </div>

                <div id="chats-list" style="overflow-y: auto; height: calc(100vh - 180px);"></div>
            </div>

            <!-- Users View -->
            <div id="users-view">
                <div class="app-header">
                    <h2>Users</h2>
                    <div class="header-icons">
                        <i class="fas fa-user-plus"></i>
                    </div>
                </div>

                <div class="search-bar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="search-users" placeholder="Find users...">
                    </div>
                </div>

                <div id="users-list" style="overflow-y: auto; height: calc(100vh - 180px);"></div>
            </div>

            <!-- Profile View -->
            <div id="profile-view">
                <div class="profile-header">
                    <i class="fas fa-arrow-left back-btn" onclick="showChatsView()"></i>
                    <h3>Profile</h3>
                </div>

                <div class="profile-content">
                    <div class="profile-avatar-section">
                        <div class="profile-avatar" id="profile-avatar">NS</div>
                        <h2 id="profile-name"></h2>
                    </div>

                    <div class="profile-field" onclick="editStatus()">
                        <label>Status</label>
                        <div class="value">
                            <span id="profile-status"></span>
                            <i class="fas fa-pen"></i>
                        </div>
                    </div>

                    <div class="profile-field">
                        <label>Phone</label>
                        <div class="value" id="profile-phone"></div>
                    </div>

                    <div class="profile-field">
                        <label>Email</label>
                        <div class="value" id="profile-email"></div>
                    </div>
                </div>
            </div>

            <!-- Settings View -->
            <div id="settings-view">
                <div class="profile-header">
                    <i class="fas fa-arrow-left back-btn" onclick="showChatsView()"></i>
                    <h3>Settings</h3>
                </div>

                <div class="profile-content">
                    <div class="settings-section">
                        <div class="settings-title">Account</div>
                        <div class="settings-item" onclick="editName()">
                            <i class="fas fa-user"></i>
                            <span>Name</span>
                            <span class="value" id="settings-name"></span>
                        </div>
                        <div class="settings-item" onclick="editStatus()">
                            <i class="fas fa-smile"></i>
                            <span>Status</span>
                            <span class="value" id="settings-status"></span>
                        </div>
                    </div>

                    <div class="settings-section">
                        <div class="settings-title">Chats</div>
                        <div class="settings-item">
                            <i class="fas fa-moon"></i>
                            <span>Dark Mode</span>
                            <span class="value">On</span>
                        </div>
                        <div class="settings-item">
                            <i class="fas fa-bell"></i>
                            <span>Notifications</span>
                            <span class="value">On</span>
                        </div>
                    </div>

                    <div class="settings-section">
                        <div class="settings-title">Privacy</div>
                        <div class="settings-item">
                            <i class="fas fa-lock"></i>
                            <span>Last Seen</span>
                            <span class="value">Everyone</span>
                        </div>
                    </div>

                    <button class="btn-primary" onclick="logout()" style="margin-top: 20px;">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>

            <!-- Chat View -->
            <div id="chat-view">
                <div class="chat-header">
                    <i class="fas fa-arrow-left back-btn" onclick="showChatsView()"></i>
                    <div class="chat-header-info">
                        <h3 id="chat-user-name">Loading...</h3>
                        <p id="chat-user-status">...</p>
                    </div>
                    <div class="chat-header-actions">
                        <i class="fas fa-phone"></i>
                        <i class="fas fa-video"></i>
                        <i class="fas fa-ellipsis-v"></i>
                    </div>
                </div>

                <div id="chat-messages"></div>

                <div class="chat-input-area">
                    <i class="fas fa-smile"></i>
                    <i class="fas fa-paperclip"></i>
                    <input type="text" id="message-input" placeholder="Type a message" onkeypress="handleTyping(event)">
                    <button class="send-btn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>

            <!-- Bottom Navigation -->
            <div class="bottom-nav">
                <div class="nav-item active" onclick="switchView('chats')">
                    <i class="fas fa-comment"></i>
                    <span>Chats</span>
                </div>
                <div class="nav-item" onclick="switchView('users')">
                    <i class="fas fa-users"></i>
                    <span>Users</span>
                </div>
                <div class="nav-item" onclick="switchView('profile')">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </div>
                <div class="nav-item" onclick="switchView('settings')">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Edit</h3>
            <input type="text" id="modal-input" placeholder="Enter new value">
            <div class="modal-buttons">
                <button class="save" onclick="saveEdit()">Save</button>
                <button class="cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
  apiKey: "AIzaSyD6PdODoYg_jhRfd9ZEZ72ftlvjZwAyxSg",
  authDomain: "ns-chat-b0965.firebaseapp.com",
  projectId: "ns-chat-b0965",
  storageBucket: "ns-chat-b0965.firebasestorage.app",
  messagingSenderId: "777022101127",
  appId: "1:777022101127:web:a861ac69d3cbfeb3028a22",
  measurementId: "G-LEF0GC4XRW"
};

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Enable offline persistence
        db.enablePersistence().catch(err => console.log('Persistence error:', err));

        // ==================== GLOBAL VARIABLES ====================
        let currentUser = null;
        let currentUserData = null;
        let currentChatUser = null;
        let currentChatId = null;
        let messagesUnsubscribe = null;
        let typingTimeout = null;
        let otpTimer = 30;
        let timerInterval = null;
        let pendingName = '';
        let pendingPhone = '';
        let currentEditField = '';

        // ==================== AUTH STATE ====================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                
                await saveUserToFirestore(user);
                await loadUserData();
                loadChats();
                loadUsers();
                updateOnlineStatus(true);
                
                showChatsView();
            } else {
                currentUser = null;
                document.getElementById('login-screen').style.display = 'block';
                document.getElementById('main-app').style.display = 'none';
                
                if (messagesUnsubscribe) messagesUnsubscribe();
                clearLoginFields();
            }
        });

        function clearLoginFields() {
            document.getElementById('name').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('email-name').value = '';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        // ==================== SAVE USER ====================
        async function saveUserToFirestore(user) {
            const userRef = db.collection('users').doc(user.uid);
            const doc = await userRef.get();
            
            if (!doc.exists) {
                const name = pendingName || user.displayName || user.email?.split('@')[0] || 'User';
                
                await userRef.set({
                    uid: user.uid,
                    name: name,
                    email: user.email || '',
                    phone: user.phoneNumber || pendingPhone || '',
                    avatar: name.charAt(0).toUpperCase(),
                    status: 'Hey there! I am using NS CHAT',
                    online: true,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                pendingName = '';
                pendingPhone = '';
            } else {
                await userRef.update({
                    online: true,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        }

        // ==================== LOAD USER DATA ====================
        async function loadUserData() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists) {
                currentUserData = doc.data();
                const data = currentUserData;
                
                document.getElementById('profile-name').textContent = data.name;
                document.getElementById('profile-avatar').textContent = data.avatar || data.name.charAt(0).toUpperCase();
                document.getElementById('profile-status').textContent = data.status || 'Hey there!';
                document.getElementById('profile-phone').textContent = data.phone || 'Not provided';
                document.getElementById('profile-email').textContent = data.email || 'Not provided';
                document.getElementById('settings-name').textContent = data.name;
                document.getElementById('settings-status').textContent = data.status || 'Hey there!';
            }
        }

        // ==================== UPDATE ONLINE STATUS ====================
        function updateOnlineStatus(status) {
            if (!currentUser) return;
            db.collection('users').doc(currentUser.uid).update({
                online: status,
                lastSeen: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        window.addEventListener('beforeunload', () => {
            if (currentUser) {
                db.collection('users').doc(currentUser.uid).update({
                    online: false,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        });

        // ==================== LOAD USERS ====================
        function loadUsers() {
            if (!currentUser) return;
            
            db.collection('users')
                .where('uid', '!=', currentUser.uid)
                .onSnapshot((snapshot) => {
                    const usersList = document.getElementById('users-list');
                    usersList.innerHTML = '';
                    
                    snapshot.forEach((doc) => {
                        const user = doc.data();
                        usersList.appendChild(createUserItem(user));
                    });
                });
        }

        function createUserItem(user) {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `
                <div class="chat-avatar">
                    ${user.avatar || user.name.charAt(0).toUpperCase()}
                    ${user.online ? '<span class="online-badge"></span>' : ''}
                </div>
                <div class="chat-info">
                    <div class="chat-name">${user.name}</div>
                    <div class="chat-last-msg">${user.status || 'Hey there!'}</div>
                </div>
            `;
            div.onclick = () => startChat(user);
            return div;
        }

        // ==================== LOAD CHATS ====================
        function loadChats() {
            if (!currentUser) return;
            
            db.collection('chats')
                .where('participants', 'array-contains', currentUser.uid)
                .orderBy('lastMessageTime', 'desc')
                .onSnapshot(async (snapshot) => {
                    const chatsList = document.getElementById('chats-list');
                    chatsList.innerHTML = '';
                    
                    for (const doc of snapshot.docs) {
                        const chat = doc.data();
                        const otherUserId = chat.participants.find(id => id !== currentUser.uid);
                        const otherUser = await getUserData(otherUserId);
                        
                        if (otherUser) {
                            chatsList.appendChild(createChatItem(chat, otherUser, doc.id));
                        }
                    }
                });
        }

        async function getUserData(userId) {
            const doc = await db.collection('users').doc(userId).get();
            return doc.exists ? doc.data() : null;
        }

        function createChatItem(chat, user, chatId) {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `
                <div class="chat-avatar">
                    ${user.avatar || user.name.charAt(0).toUpperCase()}
                    ${user.online ? '<span class="online-badge"></span>' : ''}
                </div>
                <div class="chat-info">
                    <div class="chat-name">${user.name}</div>
                    <div class="chat-last-msg">
                        ${chat.lastMessage || 'No messages yet'}
                    </div>
                </div>
                <div class="chat-time">
                    ${chat.lastMessageTime ? formatTime(chat.lastMessageTime.toDate()) : ''}
                </div>
            `;
            div.onclick = () => openChat(user, chatId);
            return div;
        }

        // ==================== CHAT FUNCTIONS ====================
        async function startChat(user) {
            if (!currentUser) return;
            
            const chatsRef = db.collection('chats');
            const snapshot = await chatsRef
                .where('participants', 'array-contains', currentUser.uid)
                .get();
            
            let existingChatId = null;
            
            snapshot.forEach((doc) => {
                const chat = doc.data();
                if (chat.participants.includes(user.uid)) {
                    existingChatId = doc.id;
                }
            });
            
            if (existingChatId) {
                openChat(user, existingChatId);
            } else {
                const newChat = {
                    participants: [currentUser.uid, user.uid],
                    lastMessage: '',
                    lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                    lastMessageStatus: 'sent',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                const doc = await chatsRef.add(newChat);
                openChat(user, doc.id);
            }
        }

        function openChat(user, chatId) {
            currentChatUser = user;
            currentChatId = chatId;
            
            document.getElementById('chat-user-name').textContent = user.name;
            document.getElementById('chat-user-status').textContent = user.online ? 'Online' : 'Offline';
            
            document.getElementById('chats-view').style.display = 'none';
            document.getElementById('users-view').style.display = 'none';
            document.getElementById('profile-view').style.display = 'none';
            document.getElementById('settings-view').style.display = 'none';
            document.getElementById('chat-view').style.display = 'flex';
            
            loadMessages(chatId);
        }

        function showChatsView() {
            document.getElementById('chat-view').style.display = 'none';
            document.getElementById('chats-view').style.display = 'block';
            document.getElementById('users-view').style.display = 'none';
            document.getElementById('profile-view').style.display = 'none';
            document.getElementById('settings-view').style.display = 'none';
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelectorAll('.nav-item')[0].classList.add('active');
        }

        // ==================== LOAD MESSAGES ====================
        function loadMessages(chatId) {
            if (messagesUnsubscribe) messagesUnsubscribe();
            
            messagesUnsubscribe = db.collection('messages')
                .where('chatId', '==', chatId)
                .orderBy('timestamp', 'asc')
                .onSnapshot((snapshot) => {
                    const messagesContainer = document.getElementById('chat-messages');
                    messagesContainer.innerHTML = '';
                    
                    snapshot.forEach((doc) => {
                        const message = doc.data();
                        displayMessage(message);
                    });
                    
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    markMessagesAsRead(chatId);
                });
        }

        function displayMessage(message) {
            const div = document.createElement('div');
            div.className = `message ${message.senderId === currentUser.uid ? 'sent' : 'received'}`;
            
            const time = message.timestamp ? message.timestamp.toDate() : new Date();
            const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            div.innerHTML = `
                <div>${escapeHtml(message.text)}</div>
                <div class="message-time">${timeStr}</div>
            `;
            
            document.getElementById('chat-messages').appendChild(div);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function markMessagesAsRead(chatId) {
            if (!currentUser || !currentChatUser) return;
            
            db.collection('messages')
                .where('chatId', '==', chatId)
                .where('receiverId', '==', currentUser.uid)
                .where('status', '==', 'sent')
                .get()
                .then((snapshot) => {
                    snapshot.forEach((doc) => {
                        doc.ref.update({ status: 'delivered' });
                    });
                });
        }

        // ==================== SEND MESSAGE ====================
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            
            if (!text || !currentChatUser || !currentChatId) return;
            
            const message = {
                chatId: currentChatId,
                senderId: currentUser.uid,
                receiverId: currentChatUser.uid,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'sent'
            };
            
            await db.collection('messages').add(message);
            
            await db.collection('chats').doc(currentChatId).update({
                lastMessage: text,
                lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                lastMessageStatus: 'sent'
            });
            
            input.value = '';
        }

        function handleTyping(event) {
            if (event.key === 'Enter') {
                sendMessage();
                return;
            }
            
            if (!currentChatUser || !currentChatId) return;
            
            const typingRef = db.collection('typing').doc(`${currentUser.uid}_${currentChatUser.uid}`);
            
            typingRef.set({
                isTyping: true,
                userId: currentUser.uid,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            if (typingTimeout) clearTimeout(typingTimeout);
            
            typingTimeout = setTimeout(() => {
                typingRef.delete();
            }, 2000);
        }

        // ==================== PHONE AUTH ====================
        function sendOTP() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            
            if (!name || !phone || phone.length !== 10) {
                alert('Please enter valid name and 10-digit phone number');
                return;
            }
            
            pendingName = name;
            pendingPhone = '+91' + phone;
            document.getElementById('display-phone').textContent = pendingPhone;
            
            document.getElementById('phone-login').classList.remove('active');
            document.getElementById('otp-verification').classList.add('active');
            
            startOTPTimer();
        }

        function verifyOTP() {
            const otp = getOTP();
            
            if (otp === '123456') {
                // Demo login - in production, use Firebase Phone Auth
                const mockUser = {
                    uid: 'user_' + Date.now(),
                    displayName: pendingName,
                    phoneNumber: pendingPhone,
                    email: ''
                };
                
                saveDemoUser(mockUser);
                clearInterval(timerInterval);
            } else {
                alert('Invalid OTP. Try 123456');
            }
        }

        function getOTP() {
            let otp = '';
            for (let i = 1; i <= 6; i++) {
                otp += document.getElementById(`otp${i}`).value;
            }
            return otp;
        }

        function saveDemoUser(user) {
            const userRef = db.collection('users').doc(user.uid);
            
            userRef.set({
                uid: user.uid,
                name: user.displayName,
                phone: user.phoneNumber,
                email: '',
                avatar: user.displayName.charAt(0).toUpperCase(),
                status: 'Hey there! I am using NS CHAT',
                online: true,
                lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                loadUserData();
                loadChats();
                loadUsers();
                showChatsView();
            });
        }

        function startOTPTimer() {
            const timerEl = document.getElementById('timer');
            const resendBtn = document.getElementById('resendOtpBtn');
            
            resendBtn.disabled = true;
            otpTimer = 30;
            
            timerInterval = setInterval(() => {
                otpTimer--;
                timerEl.textContent = `00:${otpTimer.toString().padStart(2, '0')}`;
                
                if (otpTimer <= 0) {
                    clearInterval(timerInterval);
                    resendBtn.disabled = false;
                    timerEl.textContent = '00:30';
                }
            }, 1000);
        }

        function resendOTP() {
            otpTimer = 30;
            startOTPTimer();
        }

        function backToPhone() {
            document.getElementById('otp-verification').classList.remove('active');
            document.getElementById('phone-login').classList.add('active');
            clearInterval(timerInterval);
        }

        function moveToNext(input, nextId) {
            if (input.value.length === 1 && nextId < 6) {
                document.getElementById(`otp${nextId + 1}`).focus();
            }
        }

        // ==================== GOOGLE AUTH ====================
        async function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
            } catch (error) {
                alert('Google login failed: ' + error.message);
            }
        }

        // ==================== EMAIL AUTH ====================
        async function emailSignup() {
            const name = document.getElementById('email-name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!name || !email || !password) {
                alert('Please fill all fields');
                return;
            }
            
            try {
                let userCredential;
                try {
                    userCredential = await auth.signInWithEmailAndPassword(email, password);
                } catch (error) {
                    if (error.code === 'auth/user-not-found') {
                        userCredential = await auth.createUserWithEmailAndPassword(email, password);
                        pendingName = name;
                    } else {
                        throw error;
                    }
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // ==================== PROFILE FUNCTIONS ====================
        function editStatus() {
            currentEditField = 'status';
            document.getElementById('modal-title').textContent = 'Edit Status';
            document.getElementById('modal-input').value = currentUserData?.status || '';
            document.getElementById('edit-modal').classList.add('active');
        }

        function editName() {
            currentEditField = 'name';
            document.getElementById('modal-title').textContent = 'Edit Name';
            document.getElementById('modal-input').value = currentUserData?.name || '';
            document.getElementById('edit-modal').classList.add('active');
        }

        async function saveEdit() {
            const newValue = document.getElementById('modal-input').value.trim();
            
            if (!newValue) return;
            
            const updateData = {};
            if (currentEditField === 'status') {
                updateData.status = newValue;
            } else if (currentEditField === 'name') {
                updateData.name = newValue;
                updateData.avatar = newValue.charAt(0).toUpperCase();
            }
            
            await db.collection('users').doc(currentUser.uid).update(updateData);
            await loadUserData();
            closeModal();
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.remove('active');
        }

        // ==================== LOGOUT ====================
        async function logout() {
            await updateOnlineStatus(false);
            await auth.signOut();
        }

        // ==================== VIEW FUNCTIONS ====================
        function switchView(view) {
            document.getElementById('chats-view').style.display = 'none';
            document.getElementById('users-view').style.display = 'none';
            document.getElementById('profile-view').style.display = 'none';
            document.getElementById('settings-view').style.display = 'none';
            document.getElementById('chat-view').style.display = 'none';
            
            document.getElementById(view + '-view').style.display = 'block';
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (view === 'chats') document.querySelectorAll('.nav-item')[0].classList.add('active');
            if (view === 'users') document.querySelectorAll('.nav-item')[1].classList.add('active');
            if (view === 'profile') document.querySelectorAll('.nav-item')[2].classList.add('active');
            if (view === 'settings') document.querySelectorAll('.nav-item')[3].classList.add('active');
        }

        function switchLoginTab(tab) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'phone') {
                document.querySelectorAll('.login-tab')[0].classList.add('active');
                document.getElementById('phone-login').classList.add('active');
            } else {
                document.querySelectorAll('.login-tab')[1].classList.add('active');
                document.getElementById('email-login').classList.add('active');
            }
        }

        function formatTime(date) {
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            
            if (date >= today) {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else {
                return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
            }
        }

        // Search
        document.getElementById('search-users')?.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('#users-list .chat-item').forEach(item => {
                const name = item.querySelector('.chat-name')?.textContent.toLowerCase() || '';
                item.style.display = name.includes(term) ? 'flex' : 'none';
            });
        });

        document.getElementById('search-chats')?.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('#chats-list .chat-item').forEach(item => {
                const name = item.querySelector('.chat-name')?.textContent.toLowerCase() || '';
                item.style.display = name.includes(term) ? 'flex' : 'none';
            });
        });

        // Close modal on outside click
        window.addEventListener('click', (e) => {
            if (e.target === document.getElementById('edit-modal')) {
                closeModal();
            }
        });

        // Initialize
        console.log('NS CHAT - Mobile Optimized Ready');
    </script>
</body>
</html>
